<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - HERBORISTERIE TOUBA</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

h1{
color:#2e7d32;
}

.card{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
background:#2e7d32;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}
</style>

</head>

<body>

<h1>🌿 Tableau de bord</h1>

<div class="card">

<h2>Ajouter un produit</h2>

<input id="nom" placeholder="Nom du produit">

<input id="prix" placeholder="Prix">

<input id="image" placeholder="Lien de l'image">

<select id="categorie">

<option value="huiles">Huiles</option>

<option value="cremes">Crèmes</option>

<option value="plantes">Plantes</option>

<option value="cosmetiques">Cosmétiques</option>

</select>

<textarea id="description" placeholder="Description"></textarea>

<button id="ajouter">
Ajouter
</button>

<p id="message"></p>

</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
