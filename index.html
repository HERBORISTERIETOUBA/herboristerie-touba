*{

body{

.container{

/*================ TOP BAR ================*/

.top-bar{
background:#14532d;
color:#fff;
text-align:center;
padding:10px;
font-size:15px;
font-weight:700;
}

/*================ HEADER ================*/

header{
position:fixed;
top:40px;
left:0;
width:100%;
background:#fff;
box-shadow:0 3px 12px rgba(0,0,0,.08);
z-index:999;
}

.nav{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 18px;
gap:15px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:55px;
height:55px;
border-radius:50%;
}

.logo span{
font-size:20px;
font-weight:800;
color:#14532d;
}

.search-box{
flex:1;
max-width:270px;
position:relative;
}

.search-box input{
width:100%;
height:44px;
border-radius:30px;
border:1px solid #ddd;
padding-left:45px;
padding-right:15px;
font-size:15px;
outline:none;
transition:.3s;
}

.search-box input:focus{
border-color:#1f6b3b;
}

.search-box svg{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:18px;
height:18px;
fill:#777;
}

.menu-btn{
font-size:34px;
color:#14532d;
cursor:pointer;
}

/*================ HERO ================*/

.hero{
margin-top:120px;
height:460px;
background:url("banner.png") center/cover no-repeat;
border-radius:0 0 35px 35px;
overflow:hidden;
}

.overlay{
background:rgba(0,0,0,.28);
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero-content{
color:#fff;
max-width:700px;
}

.hero-content h1{
font-size:56px;
font-weight:800;
line-height:1.2;
margin-bottom:20px;
}

.hero-content p{
font-size:22px;
margin-bottom:35px;
}

.btn{
display:inline-block;
padding:16px 42px;
background:#1f6b3b;
color:#fff;
text-decoration:none;
border-radius:50px;
font-weight:800;
font-size:18px;
transition:.3s;
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.btn:hover{
transform:translateY(-4px);
background:#14532d;
}

section{
padding:70px 0;
}

.title{
text-align:center;
font-size:42px;
color:#1f6b3b;
margin-bottom:45px;
font-weight:800;
}

/*================ CARDS ================*/

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
}

.card{
position:relative;
height:220px;
overflow:hidden;
border-radius:20px;
transition:.35s;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
transition:.4s;
}

.card:hover img{
transform:scale(1.08);
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 15px 30px rgba(0,0,0,.18);
}

.cover{
position:absolute;
inset:0;
background:rgba(0,0,0,.42);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
}

.cover h3{
font-size:34px;
margin-bottom:10px;
}

.cover p{
font-size:18px;
}

.big-card{
margin-top:22px;
height:250px;
grid-column:1/5;
border-radius:22px;
background:url("file_00000000747471f4819e52652c6eff83.png") center/cover;
overflow:hidden;
position:relative;
transition:.35s;
}

.big-card:hover{
transform:translateY(-8px);
box-shadow:0 15px 30px rgba(0,0,0,.18);
}

/*================ FEATURES ================*/

.features{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
margin-top:40px;
}

.feature{
background:white;
border-radius:18px;
padding:30px;
text-align:center;
box-shadow:0 5px 18px rgba(0,0,0,.08);
transition:.3s;
}

.feature:hover{
transform:translateY(-6px);
}

.feature h3{
color:#14532d;
margin:15px 0;
}

.feature p{
font-size:15px;
color:#666;
}
